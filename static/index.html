<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訊息模板小工具</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="icon" type="image/png" sizes="256x256" href="/static/favicon.png">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="header-wrap">
    <header>
      <h1>訊息模板小工具</h1>
      <div class="mode-toggle">
        <button class="toggle-btn active" data-view="generate" onclick="switchView('generate')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
          使用
        </button>
        <button class="toggle-btn" data-view="editor" onclick="switchView('editor')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          編輯
        </button>
      </div>
    </header>
  </div>

  <main>
    <!-- ===== 產生信件 ===== -->
    <section id="view-generate" class="view active">
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="搜尋模板名稱、標籤或描述..." oninput="filterTemplates()">
      </div>
      <div id="tag-pool" class="tag-pool"></div>
      <div id="template-cards" class="card-grid"></div>

      <!-- 填入變數 & 預覽 -->
      <div id="compose-panel" class="compose-panel hidden">
        <button class="back-btn" onclick="closeCompose()">&larr; 返回模板列表</button>
        <h2 id="compose-title"></h2>
        <div id="variable-inputs" class="variable-inputs"></div>
        <label class="field-label">信件內容預覽</label>
        <textarea id="compose-output" class="compose-output" oninput="markEdited()"></textarea>
        <div class="compose-actions">
          <button class="btn btn-primary" onclick="copyEmail()">複製信件內容</button>
          <button class="btn btn-secondary hidden" id="btn-update-template" onclick="updateFromCompose()">更新現有模板</button>
          <button class="btn btn-secondary hidden" id="btn-save-new" onclick="saveAsNewFromCompose()">新增為新的模板</button>
        </div>
      </div>
    </section>

    <!-- ===== 新增/編輯模板 ===== -->
    <section id="view-editor" class="view">
      <div class="editor-sidebar">
        <h3>已儲存的模板</h3>
        <div id="editor-template-list" class="editor-template-list"></div>
        <button class="btn btn-primary" onclick="newTemplate()" style="width:100%;margin-top:12px">+ 新增模板</button>
      </div>
      <div class="editor-main">
        <div class="form-group">
          <label class="field-label">模板名稱 <span class="required">*</span></label>
          <input type="text" id="tpl-name" placeholder="例：講座講師邀請信件">
        </div>
        <div class="form-group">
          <label class="field-label">用途描述（選填）</label>
          <input type="text" id="tpl-desc" placeholder="簡述此模板的使用情境">
        </div>
        <div class="form-group">
          <label class="field-label">標籤（以 Enter 新增）</label>
          <div class="tag-input-wrap">
            <div id="tpl-tags-display" class="tags-display"></div>
            <input type="text" id="tpl-tag-input" placeholder="輸入標籤後按 Enter" oninput="showTagSuggestions()" onkeydown="handleTagKey(event)" onfocus="showTagSuggestions()" onblur="hideTagSuggestionsDelay()">
          </div>
          <div id="tag-suggestions" class="tag-suggestions hidden"></div>
        </div>
        <div class="form-group">
          <label class="field-label">填入項目（變數）</label>
          <div id="tpl-variables" class="variables-list"></div>
          <button class="btn btn-sm" onclick="addVariable()">+ 新增填入項目</button>
          <p class="hint">新增後可將下方的變數組件拖曳或點擊插入到信件內容中</p>
        </div>
        <div class="form-group">
          <label class="field-label">信件內容</label>
          <div id="var-chips" class="var-chips"></div>
          <textarea id="tpl-body" class="tpl-body" placeholder="撰寫信件模板內容...&#10;將上方的填入項目拖曳至此處，或點擊插入"></textarea>
        </div>
        <div class="editor-actions">
          <button class="btn btn-primary" onclick="saveTemplate()">儲存模板</button>
          <button class="btn btn-danger hidden" id="btn-delete-tpl" onclick="deleteTemplate()">刪除模板</button>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <span>作者：<a href="https://yi-hung-lee.work" target="_blank" rel="noopener">李奕宏</a></span>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
